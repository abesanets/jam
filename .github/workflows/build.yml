name: Build JAM.exe with MSVC

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Add MSVC to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build JAM
      run: |
        cl /O2 /W4 /EHsc jam\main.cpp /Fe:jam.exe /link /SUBSYSTEM:CONSOLE

    - name: Upload JAM.exe
      uses: actions/upload-artifact@v4
      with:
        name: jam.exe
        path: jam.exe
